<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance | Institutional Portal</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#001a33">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('service-worker.js').catch(err => console.error('SW register error:', err));
        });
      }
    </script>
    <script>
        const themeToggle = document.getElementById('themeToggle');
        const themeCircle = document.getElementById('themeCircle');
        const themeIcon = document.getElementById('themeIcon');
        const body = document.body;

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        body.setAttribute('data-theme', savedTheme);
        updateIcon(savedTheme);

        themeToggle.addEventListener('click', (e) => {
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            // Set circle position to button center
            const rect = themeToggle.getBoundingClientRect();
            themeCircle.style.top = `${rect.top + rect.height/2}px`;
            themeCircle.style.left = `${rect.left + rect.width/2}px`;
            
            // Trigger animation
            themeCircle.classList.remove('animate');
            void themeCircle.offsetWidth; // Trigger reflow
            themeCircle.classList.add('animate');
            
            // Switch theme halfway through animation
            setTimeout(() => {
                body.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateIcon(newTheme);
            }, 400);
        });

        function updateIcon(theme) {
            if (theme === 'dark') {
                themeIcon.innerHTML = `<path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>`;
            } else {
                themeIcon.innerHTML = `<path d="M12 3v1m0 16v1m9-9h1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-11.314l.707.707m11.314 11.314l.707.707M12 5a7 7 0 100 14 7 7 0 000-14z"></path>`;
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #003366;
            --primary-dark: #002244;
            --primary-light: #004d99;
            --secondary: #ffcc00;
            --secondary-dark: #e6b800;
            --background: #f0f4f8;
            --card: #ffffff;
            --text-main: #0a192f;
            --text-muted: #475569;
            --border: #cbd5e1;
            --success: #10b981;
            --danger: #ef4444;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- DARK MODE PALETTE --- */
        [data-theme="dark"] {
            --primary: #4cc9f0;
            --primary-dark: #020617;
            --primary-light: #3a0ca3;
            --secondary: #f72585;
            --secondary-dark: #b5179e;
            --background: #020617;
            --card: rgba(15, 23, 42, 0.85);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #1e293b;
            --success: #4ade80;
            --danger: #fb7185;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--background);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: background var(--transition), color var(--transition);
        }

        /* === THEME TOGGLE BUTTON === */
        .theme-toggle {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 1000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: var(--card);
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border-color: var(--primary);
        }

        /* Theme Animation Circle */
        .theme-transition-circle {
            position: fixed;
            top: 0;
            left: 0;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary-dark);
            pointer-events: none;
            z-index: 999;
            transform: scale(0);
            opacity: 0;
        }

        .theme-transition-circle.animate {
            animation: circleExpand 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes circleExpand {
            0% { transform: scale(0); opacity: 1; }
            50% { opacity: 1; }
            100% { transform: scale(500); opacity: 0; }
        }

        /* === ANIMATED BACKGROUND === */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: var(--background);
            transition: background 1s ease;
            z-index: 0;
        }
        
        [data-theme="dark"] .bg-gradient {
            background: radial-gradient(circle at top right, #1e1b4b, #020617);
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            transition: background 1s ease, opacity 1s ease;
            animation: blobFloat 12s ease-in-out infinite;
            z-index: 0;
        }
        .blob-1 { width: 500px; height: 500px; background: #1a4d8a; top: -150px; left: -100px; animation-delay: 0s; }
        .blob-2 { width: 400px; height: 400px; background: var(--secondary); top: 60%; right: -100px; animation-delay: -4s; opacity: 0.1; }
        .blob-3 { width: 300px; height: 300px; background: #0066cc; bottom: -100px; left: 30%; animation-delay: -8s; }

        @keyframes blobFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.97); }
        }

        /* Grid dots overlay */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 0;
        }

        /* === AUTH CARD === */
        .auth-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            animation: cardEntrance 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0)    scale(1);    }
        }

        .auth-container {
            background: var(--card);
            border-radius: 28px;
            padding: 44px 40px;
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: background var(--transition), border var(--transition);
        }

        /* Shimmering top border */
        .auth-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 50%, var(--primary) 100%);
            background-size: 200% 100%;
            animation: shimmerBorder 3s linear infinite;
        }

        @keyframes shimmerBorder {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        /* === HEADER === */
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 16px;
            animation: logoPulse 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
        }

        @keyframes logoPulse {
            from { transform: scale(0.5); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        .logo-wrap img { height: 80px; object-fit: contain; display: block; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); }

        .logo-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 2px solid var(--secondary);
            opacity: 0.5;
            animation: ringPulse 2.5s ease-in-out infinite;
        }

        @keyframes ringPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.1; }
        }

        .auth-header h1 {
            font-size: 1.85rem;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: -0.03em;
            line-height: 1.1;
            transition: color var(--transition);
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.87rem;
            margin-top: 6px;
            font-weight: 500;
        }

        /* === TABS === */
        .auth-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: var(--background);
            padding: 4px;
            border-radius: 14px;
            margin-bottom: 28px;
            position: relative;
            border: 1px solid var(--border);
            transition: background var(--transition);
        }

        .tab-btn {
            border: none;
            padding: 11px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: transparent;
            color: var(--text-muted);
            position: relative;
            z-index: 1;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 14px rgba(0, 51, 102, 0.35);
        }

        /* === FORMS === */
        .form-group { margin-bottom: 18px; position: relative; }

        label {
            display: block;
            font-weight: 700;
            font-size: 0.72rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 7px;
            transition: color var(--transition);
        }

        .input-wrap { position: relative; }

        input, select {
            width: 100%;
            padding: 13px 16px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            font-size: 0.95rem;
            font-weight: 500;
            font-family: inherit;
            transition: all 0.25s ease;
            background: var(--background);
            color: var(--text-main);
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background: var(--card);
            box-shadow: 0 0 0 4px rgba(76, 201, 240, 0.1), 0 1px 3px rgba(0,0,0,0.05);
        }

        input::placeholder { color: var(--text-muted); opacity: 0.6; }


        /* === SUBMIT BUTTON === */
        .submit-btn {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.01em;
        }

        .submit-btn:hover:not(:disabled) {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 51, 102, 0.4);
        }

        .submit-btn:active:not(:disabled) { transform: translateY(0); }

        .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        .submit-btn .btn-text { transition: opacity 0.2s; }
        .submit-btn .btn-spinner { display: none; }

        .submit-btn.loading .btn-text { display: none; }
        .submit-btn.loading .btn-spinner {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .spinner-ring {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Ripple */
        .ripple-effect {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.35);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }
        @keyframes ripple {
            to { transform: scale(4); opacity: 0; }
        }

        /* === REGISTER BUTTON === */
        .register-btn {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--secondary) 0%, #ffd740 100%);
            color: var(--primary);
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .register-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 204, 0, 0.45);
        }

        .register-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .register-btn .btn-text { transition: opacity 0.2s; }
        .register-btn .btn-spinner { display: none; }
        .register-btn.loading .btn-text { display: none; }
        .register-btn.loading .btn-spinner { display: inline-flex; align-items: center; gap: 8px; }

        /* === FORGOT LINK === */
        .forgot-link {
            display: block;
            text-align: right;
            margin-top: -12px;
            margin-bottom: 18px;
            font-size: 0.8rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .forgot-link:hover { color: var(--primary-light); text-decoration: underline; }

        /* === MESSAGES === */
        .msg {
            margin-top: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            font-size: 0.85rem;
            display: none;
            animation: msgReveal 0.3s ease;
        }
        @keyframes msgReveal {
            from { transform: translateY(-8px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .msg.error   { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; display: block; }
        .msg.success { background: #dcfce7; color: #15803d; border: 1px solid #86efac; display: block; }

        /* Notice text */
        .notice-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 6px;
            line-height: 1.5;
        }

        /* Form slide animation */
        .form-slide {
            animation: formSlideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes formSlideIn {
            from { opacity: 0; transform: translateX(12px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* === FOOTER === */
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            position: relative;
            z-index: 10;
        }

        @media (max-width: 480px) {
            .auth-container { padding: 32px 24px; }
            .auth-header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Theme Transition Overlay -->
    <div id="themeCircle" class="theme-transition-circle"></div>

    <button id="themeToggle" class="theme-toggle" aria-label="Toggle Dark Mode">
        <svg id="themeIcon" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M12 3v1m0 16v1m9-9h1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-11.314l.707.707m11.314 11.314l.707.707M12 5a7 7 0 100 14 7 7 0 000-14z"></path>
        </svg>
    </button>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-header">
                <div class="logo-wrap">
                    <img src="https://image2url.com/r2/default/images/1773668714074-7eaefdc5-c41e-4f3b-a408-a1285f72e3c4.png" alt="Lendi Logo">
                    <div class="logo-ring"></div>
                </div>
                <h1>Attendance Hub</h1>
                <p>Institutional Verification Portal</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" id="loginTab">Sign In</button>
                <button class="tab-btn" id="registerTab">Sign Up</button>
            </div>

            <form id="loginForm" class="form-slide">
                <div class="form-group">
                    <label>Access Role</label>
                    <select id="loginType">
                        <option value="student">Student</option>
                        <option value="cr">Class CR</option>
                        <option value="faculty">Faculty Member</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>
                <div class="form-group">
                    <label id="loginIdLabel">University Roll Number</label>
                    <input type="text" id="loginId" placeholder="Enter Registration ID" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Secure Access Key</label>
                    <input type="password" id="loginPass" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <a href="#" class="forgot-link" id="forgotLink">Forgot Password?</a>
                <button type="submit" class="submit-btn" id="loginSubmitBtn">
                    <span class="btn-text">Continue to Dashboard</span>
                    <span class="btn-spinner"><span class="spinner-ring"></span>Authenticating...</span>
                </button>
                <div id="loginMsg" class="msg"></div>
            </form>

            <form id="registerForm" style="display:none;">
                <div class="form-group">
                    <label>Account Type</label>
                    <select id="regType">
                        <option value="faculty">Faculty Member</option>
                    </select>
                    <p id="regNotice" class="notice-text">Only faculty members can self-register. Students/CRs are added by Administration.</p>
                </div>
                <div class="form-group">
                    <label id="regIdLabel">ID Number</label>
                    <input type="text" id="regId" placeholder="Ex: FAC101" required>
                </div>
                <div class="form-group">
                    <label>Setup Password</label>
                    <input type="password" id="regPass" placeholder="Choose a strong password" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>Verify Password</label>
                    <input type="password" id="regPass2" placeholder="Repeat your password" required autocomplete="new-password">
                </div>
                <button type="submit" class="register-btn" id="registerSubmitBtn">
                    <span class="btn-text">Initialize Account</span>
                    <span class="btn-spinner"><span class="spinner-ring" style="border-top-color: var(--primary);"></span>Creating...</span>
                </button>
                <div id="registerMsg" class="msg"></div>
            </form>
        </div>

        <p class="auth-footer">© 2025 Lendi Institute of Engineering. All rights reserved.</p>
    </div>

    <script>
        // --- PORT CORRECTION ---
        if (window.location.port === '5500') {
            console.warn('Redirecting from Live Server (5500) to Backend Port (5000)...');
            window.location.href = window.location.href.replace(':5500', ':5000');
        }

        const API_BASE = '/api/auth';
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginType = document.getElementById('loginType');
        const regType = document.getElementById('regType');

        // Ripple effect helper
        function addRipple(btn, e) {
            const rect = btn.getBoundingClientRect();
            const ripple = document.createElement('span');
            ripple.className = 'ripple-effect';
            const size = Math.max(rect.width, rect.height) * 2;
            ripple.style.width = ripple.style.height = `${size}px`;
            ripple.style.left = `${e.clientX - rect.left - size/2}px`;
            ripple.style.top  = `${e.clientY - rect.top  - size/2}px`;
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 700);
        }

        document.querySelectorAll('.submit-btn, .register-btn').forEach(btn => {
            btn.addEventListener('click', e => addRipple(btn, e));
        });

        loginTab.onclick = () => {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            loginForm.classList.remove('form-slide');
            void loginForm.offsetWidth;
            loginForm.classList.add('form-slide');
        };

        registerTab.onclick = () => {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            registerForm.classList.remove('form-slide');
            void registerForm.offsetWidth;
            registerForm.classList.add('form-slide');
        };

        function updateLabels(select, labelId) {
            const label = document.getElementById(labelId);
            const val = select.value;
            if (val === 'faculty') label.innerText = "Faculty Employee ID";
            else if (val === 'admin') label.innerText = "Admin Secret Key";
            else label.innerText = "University Roll Number";
        }

        loginType.onchange = () => updateLabels(loginType, 'loginIdLabel');
        regType.onchange   = () => updateLabels(regType, 'regIdLabel');

        document.getElementById('forgotLink').onclick = async (e) => {
            e.preventDefault();
            const type  = loginType.value;
            const idVal = document.getElementById('loginId').value.trim().toUpperCase();
            if (!idVal) return showMsg('loginMsg', "Please enter your ID Number / Roll No first.", 'error');

            const msgEl = document.getElementById('loginMsg');
            msgEl.className = 'msg';
            msgEl.innerText = "Processing request...";
            msgEl.style.display = 'block';

            const payload = { type };
            if (['cr', 'student'].includes(type)) payload.reg = idVal;
            else if (type === 'faculty') payload.facultyId = idVal;
            else payload.adminId = idVal;

            try {
                const res  = await fetch(`${API_BASE}/forgot-password`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await res.json();
                showMsg('loginMsg', data.message, res.ok ? 'success' : 'error');
            } catch (err) { showMsg('loginMsg', "Server connectivity issue.", 'error'); }
        };

        function showMsg(id, text, type) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = `msg ${type}`;
        }

        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            const btn   = document.getElementById('loginSubmitBtn');
            const type  = loginType.value;
            const idVal = document.getElementById('loginId').value.trim().toUpperCase();
            const pass  = document.getElementById('loginPass').value;

            btn.classList.add('loading');
            btn.disabled = true;

            const payload = { type, pass };
            if (['cr', 'student'].includes(type)) payload.reg = idVal;
            else if (type === 'faculty') payload.facultyId = idVal;
            else payload.adminId = idVal;

            try {
                const res  = await fetch(`${API_BASE}/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await res.json();
                if (res.ok) {
                    showMsg('loginMsg', "Authorized. Opening portal…", 'success');
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    setTimeout(() => {
                        if (data.user.type === 'admin')   window.location.href = 'admin.html';
                        else if (data.user.type === 'student') window.location.href = 'student-dashboard.html';
                        else if (data.user.type === 'faculty') window.location.href = 'faculty-dashboard.html';
                        else window.location.href = 'index.html';
                    }, 900);
                    subscribeToPush(data.user._id);
                } else {
                    showMsg('loginMsg', data.message || "Invalid access credentials", 'error');
                    btn.classList.remove('loading');
                    btn.disabled = false;
                }
            } catch (err) {
                showMsg('loginMsg', "Core server unreachable.", 'error');
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        };

        registerForm.onsubmit = async (e) => {
            e.preventDefault();
            const btn  = document.getElementById('registerSubmitBtn');
            const pass = document.getElementById('regPass').value;
            if (pass !== document.getElementById('regPass2').value) {
                return showMsg('registerMsg', "Passwords do not match!", 'error');
            }

            btn.classList.add('loading');
            btn.disabled = true;

            const payload = { type: regType.value, pass, facultyId: document.getElementById('regId').value.trim().toUpperCase() };

            try {
                const res  = await fetch(`${API_BASE}/register`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await res.json();
                if (res.ok) {
                    showMsg('registerMsg', "Registration verified! Please Sign In.", 'success');
                    setTimeout(() => loginTab.click(), 2000);
                } else {
                    showMsg('registerMsg', data.message || "Registration failed", 'error');
                }
            } catch (err) { showMsg('registerMsg', "Server error.", 'error'); }
            finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        };

        async function checkReg() {
            try {
                const res  = await fetch(`${API_BASE}/registration-status`);
                const data = await res.json();
                if (!data.registrationEnabled) {
                    document.getElementById('registerTab').style.display = 'none';
                    registerForm.innerHTML = `<div style="text-align:center; padding: 30px;"><h3 style="color:var(--primary);">Restricted</h3><p style="color:var(--text-muted); margin-top:10px;">Self-registration is temporarily locked by admin.</p></div>`;
                }
            } catch(e) {}
        }

        async function subscribeToPush(userId) {
            if ('serviceWorker' in navigator && 'PushManager' in window) {
                try {
                    const registration  = await navigator.serviceWorker.ready;
                    const subscription  = await registration.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: 'BGsftwlxB0KGyt0vdlEF4htCHP3ZoGpTE07uNUvvX6lnPP2ZpLFbvwSpWwGhbg-jAj_ZFiCtI6PMvF7atn-XmRk' });
                    await fetch(`${API_BASE}/subscribe`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, subscription }) });
                } catch (err) { console.error('Push error:', err); }
            }
        }

        checkReg();
    </script>
</body>
</html>
